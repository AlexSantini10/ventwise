name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Read version from manifest
        id: version
        shell: bash
        run: |
          version=$(python -c "import json; from pathlib import Path; print(json.loads(Path('custom_components/temperature_comfort_recommender/manifest.json').read_text())['version'])")
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Check whether the release already exists
        id: release_check
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if gh release view "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip if the release already exists
        if: steps.release_check.outputs.exists == 'true'
        run: echo "Release ${{ steps.version.outputs.tag }} already exists."

      - name: Set up Python
        if: steps.release_check.outputs.exists != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        if: steps.release_check.outputs.exists != 'true'
        run: python -m pip install -e .[dev]

      - name: Run pytest
        if: steps.release_check.outputs.exists != 'true'
        run: python -m pytest tests -q

      - name: Validate with hassfest
        if: steps.release_check.outputs.exists != 'true'
        uses: home-assistant/actions/hassfest@master

      - name: Validate with HACS
        if: steps.release_check.outputs.exists != 'true'
        uses: "hacs/action@main"
        with:
          category: integration

      - name: Build release package
        if: steps.release_check.outputs.exists != 'true'
        shell: pwsh
        run: |
          ./scripts/build_release_package.ps1 -OutputPath dist/temperature_comfort_recommender.zip

      - name: Create GitHub Release
        if: steps.release_check.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release create "${{ steps.version.outputs.tag }}" dist/temperature_comfort_recommender.zip --target "${{ github.sha }}" --title "VentWise v${{ steps.version.outputs.version }}" --generate-notes --latest
