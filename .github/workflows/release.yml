name: Release

on:
  workflow_run:
    workflows: ["CI"]
    branches:
      - main
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Read version from manifest
        id: version
        shell: bash
        run: |
          version=$(python -c "import json; from pathlib import Path; print(json.loads(Path('custom_components/ventwise/manifest.json').read_text())['version'])")
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Check whether the release already exists
        id: release_check
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if gh release view "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip if the release already exists
        if: steps.release_check.outputs.exists == 'true'
        run: echo "Release ${{ steps.version.outputs.tag }} already exists."

      - name: Set up Python
        if: steps.release_check.outputs.exists != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        if: steps.release_check.outputs.exists != 'true'
        run: python -m pip install -e .[dev]

      - name: Build release package
        if: steps.release_check.outputs.exists != 'true'
        shell: pwsh
        run: |
          ./scripts/build_release_package.ps1 -OutputPath dist/ventwise.zip

      - name: Create GitHub Release
        if: steps.release_check.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release create "${{ steps.version.outputs.tag }}" dist/ventwise.zip --target "${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}" --title "VentWise v${{ steps.version.outputs.version }}" --generate-notes --latest
