name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -e .[dev]

      - name: Run pytest
        run: python -m pytest tests -q

  hassfest:
    name: Hassfest
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Validate with hassfest
        uses: home-assistant/actions/hassfest@master

  hacs:
    name: HACS validation
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Validate with HACS
        uses: "hacs/action@main"
        with:
          category: integration

  package:
    name: Build Home Assistant package
    runs-on: ubuntu-latest
    needs:
      - tests
      - hassfest
      - hacs
    if: github.event_name == 'push'
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Build release package
        shell: pwsh
        run: |
          ./scripts/build_release_package.ps1 -OutputPath dist/temperature_comfort_recommender.zip

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: temperature-comfort-recommender-package
          path: dist/temperature_comfort_recommender.zip
          if-no-files-found: error
