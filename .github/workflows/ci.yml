name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -e .[dev]

      - name: Run pytest
        run: python -m pytest tests -q

  flow-tests:
    name: Config flow tests
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -e .[dev]

      - name: Install Home Assistant test dependencies
        run: python -m pip install homeassistant

      - name: Run config flow tests
        env:
          PYTHONWARNINGS: ignore::DeprecationWarning
        run: python -m pytest tests/test_flow.py -q

  package-validation:
    name: Release package validation
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Build release package
        shell: pwsh
        run: ./scripts/build_release_package.ps1 -OutputPath dist/ventwise.zip

      - name: Verify package structure
        shell: bash
        run: |
          python - <<'PY'
          import pathlib
          import zipfile

          zip_path = pathlib.Path("dist/ventwise.zip")
          repo_root = pathlib.Path(".")
          integration_dir = repo_root / "custom_components" / "ventwise"

          with zipfile.ZipFile(zip_path) as archive:
              entries = {entry.filename for entry in archive.infolist() if not entry.is_dir()}

          expected = {
              path.relative_to(integration_dir).as_posix()
              for path in integration_dir.rglob("*")
              if path.is_file()
              and path.name != ".gitkeep"
              and "__pycache__" not in path.parts
              and path.suffix != ".pyc"
          }
          expected.update({"README.md", "LICENSE", "NOTICE", "hacs.json"})

          if any(entry.startswith("custom_components/ventwise/") for entry in entries):
              raise SystemExit("package contains an extra custom_components/ventwise/ wrapper")

          if any("__pycache__" in entry or entry.endswith(".pyc") for entry in entries):
              raise SystemExit("package contains cached Python artifacts")

          missing = sorted(expected.difference(entries))
          extra = sorted(entries.difference(expected))
          if missing:
              raise SystemExit(f"package missing required entries: {missing}")
          if extra:
              raise SystemExit(f"package contains unexpected entries: {extra}")
          PY

  hassfest:
    name: Hassfest
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Validate with hassfest
        uses: home-assistant/actions/hassfest@master

  hacs:
    name: HACS validation
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Validate with HACS
        uses: "hacs/action@main"
        with:
          category: integration
