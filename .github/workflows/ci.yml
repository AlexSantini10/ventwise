name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -e .[dev]

      - name: Run scoring model tests
        run: python -m pytest tests/test_scoring_model.py -q

      - name: Run runtime helper tests
        run: python -m pytest tests/test_runtime.py -q

  home-assistant:
    name: home-assistant
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -e .[dev]

      - name: Install Home Assistant 2026.6.3
        run: python -m pip install --upgrade homeassistant==2026.6.3

      - name: Run Home Assistant tests on 2026.6.3
        env:
          PYTHONWARNINGS: ignore::DeprecationWarning
        run: python -m pytest tests/test_flow.py tests/test_options_flow.py tests/test_compatibility.py tests/test_coordinator_runtime_state.py -q

      - name: Install Home Assistant 2026.7.2
        run: python -m pip install --upgrade homeassistant==2026.7.2

      - name: Run Home Assistant tests on 2026.7.2
        env:
          PYTHONWARNINGS: ignore::DeprecationWarning
        run: python -m pytest tests/test_flow.py tests/test_options_flow.py tests/test_compatibility.py tests/test_coordinator_runtime_state.py -q

  hassfest:
    name: hassfest
    runs-on: ubuntu-latest
    needs: home-assistant
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Validate with hassfest
        uses: home-assistant/actions/hassfest@master

  hacs:
    name: hacs
    runs-on: ubuntu-latest
    needs: home-assistant
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Validate with HACS
        uses: "hacs/action@main"
        with:
          category: integration
